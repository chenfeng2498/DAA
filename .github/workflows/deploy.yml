name: Deploy to Server

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy and Restart Backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            echo "=== 拉取最新代码 ==="
            cd /var/www/大A监控
            mkdir -p /tmp/daa-monitor-data
            if [ -f data/market.db ]; then
              cp data/market.db /tmp/daa-monitor-data/market.db
            fi
            git update-index --skip-worktree data/market.db || true
            git pull --autostash origin master
            mkdir -p data
            if [ -f /tmp/daa-monitor-data/market.db ]; then
              cp /tmp/daa-monitor-data/market.db data/market.db
            fi
            git update-index --skip-worktree data/market.db || true
            echo "=== 安装依赖 ==="
            pip3 install requests -q
            echo "=== 重启 systemd 服务 ==="
            sudo systemctl restart daa-monitor
            echo "=== 健康检查 ==="
            curl -fsS http://localhost:8080/api/dashboard > /dev/null
            sudo systemctl status daa-monitor --no-pager
            echo "=== 部署完成 ==="
            echo "服务地址: http://${{ secrets.SERVER_HOST }}:8080"
