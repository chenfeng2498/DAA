name: Deploy to Server (RSYNC Mode)

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Archive code (终极方案：先打包到 /tmp 再移回)
        run: |
          # 1. 删除不需要的目录
          rm -rf .git .github

          # 2. 先打包到 /tmp 目录，避免在当前目录生成文件导致 tar 报错
          tar -czf /tmp/daa-monitor.tar.gz .

          # 3. 把压缩包移回当前目录，供 scp-action 使用
          mv /tmp/daa-monitor.tar.gz ./daa-monitor.tar.gz

          echo "✅ 打包完成，文件大小："
          ls -lh daa-monitor.tar.gz

      - name: Copy archive to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "daa-monitor.tar.gz"
          target: "/tmp/"

      - name: Deploy and Restart via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            echo "=== 1. 备份旧版本和数据库 ==="
            cd /var/www
            TIMESTAMP=$(date +%s)
            if [ -d "大A监控" ]; then
              mv 大A监控 "大A监控_backup_${TIMESTAMP}"
              if [ -f "大A监控_backup_${TIMESTAMP}/data/market.db" ]; then
                cp "大A监控_backup_${TIMESTAMP}/data/market.db" /tmp/market.db.bak
              fi
            fi

            echo "=== 2. 部署最新代码 ==="
            mkdir -p 大A监控
            tar -xzf /tmp/daa-monitor.tar.gz -C /var/www/大A监控

            echo "=== 3. 恢复数据库 ==="
            mkdir -p /var/www/大A监控/data
            if [ -f /tmp/market.db.bak ]; then
              cp /tmp/market.db.bak /var/www/大A监控/data/market.db
              echo "✅ 数据库恢复成功"
            fi

            echo "=== 4. 安装依赖 ==="
            pip3 install requests -q

            echo "=== 5. 重启 systemd 服务 ==="
            sudo systemctl restart daa-monitor

            echo "=== 6. 健康检查 ==="
            sleep 3
            if curl -fsS http://localhost:8080/api/dashboard > /dev/null; then
              echo "✅ 健康检查通过！服务运行正常"
            else
              echo "❌ 健康检查失败，正在输出服务日志："
              sudo systemctl status daa-monitor --no-pager
            fi

            echo "=== 7. 清理临时文件 ==="
            rm -f /tmp/daa-monitor.tar.gz /tmp/market.db.bak
            echo "🎉 部署完成！"
